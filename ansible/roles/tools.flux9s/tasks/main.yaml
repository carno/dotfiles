---
- name: Check latest flux9s version
  ansible.builtin.uri:
    url: https://api.github.com/repos/dgunzy/flux9s/releases/latest
    return_content: true
    user: "{{ github_user }}"
    password: "{{ github_token }}"
    force_basic_auth: "{{ gh_auth }}"
  register: flux9s_github_details
  when: flux9s.version is undefined
  tags:
    - never
    - flux9s
    - kubernetes
    - work

- name: Set flux9s.version
  ansible.builtin.set_fact:
    flux9s:
      version: "{{ flux9s_github_details.json.tag_name }}"
  when: not flux9s_github_details is skipped
  tags:
    - never
    - flux9s
    - kubernetes
    - work

- name: Install flux9s
  ansible.builtin.unarchive:
    src: "https://github.com/dgunzy/flux9s/releases/download/{{ flux9s.version }}/flux9s-linux-x86_64-gnu.tar.gz"
    dest: "{{ lookup('ansible.builtin.env', 'HOME') }}/.local/bin"
    remote_src: true
    include:
      - flux9s
  register: flux9s_install
  tags:
    - never
    - flux9s
    - kubernetes
    - work
